name: Trigger Playwright Tests

on:
  push:
    branches:
      - main

jobs:
  trigger-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger automation repo workflow
        run: |
          curl --fail -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ahmadfadlie95/playwright-actionsets/dispatches \
            -d '{"event_type":"run-smoke-tests"}'